services:
  - type: web
    name: artisans-backend
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python Artisans/manage.py migrate
      python Artisans/manage.py collectstatic --noinput
    startCommand: gunicorn Artisans.Artisans.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: artisans-backend.onrender.com
      - key: DATABASE_ENGINE
        value: django.db.backends.sqlite3
      - key: DATABASE_NAME
        value: db.sqlite3
      - key: CORS_ALLOWED_ORIGINS
        value: https://artisans-frontend.pages.dev
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PAYSTACK_TEST_MODE
        value: "True"
