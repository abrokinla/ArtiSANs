services:
  - type: web
    name: artisans-backend
    env: python
    plan: starter
    runtime: python-3.12.0
    buildCommand: |
      pip install -r requirements.txt
      python Artisans/manage.py migrate
      python Artisans/manage.py collectstatic --noinput
    startCommand: gunicorn Artisans.Artisans.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: artisans-ojzr.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://artisans-ng.abrokinla.workers.dev,http://localhost:3000,http://localhost:3002
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PAYSTACK_TEST_MODE
        value: "True"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
